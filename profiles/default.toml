# Default agent configuration.
#
# Usage:
#   harness create                  # uses profiles/default.toml
#   harness create --profile research  # uses profiles/research.toml

name = "agent"
from = "ghcr.io/robbycochran/harness-openshell:sandbox"
command = "claude --bare"
startup = "/sandbox/startup.sh"
keep = true

providers = ["github", "vertex-local", "atlassian", "gws"]

[env]
ANTHROPIC_BASE_URL = "https://inference.local"
ANTHROPIC_API_KEY = "sk-ant-openshell-proxy-managed"
CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS = "1"
