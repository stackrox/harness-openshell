# OpenCode agent configuration.
#
# OpenCode uses ANTHROPIC_BASE_URL with inference.local/v1 (note the /v1 suffix).
# Without /v1, OpenCode sends POST /messages instead of POST /v1/messages,
# which doesn't match the inference route pattern.
#
# Usage:
#   harness apply --agent opencode

name: opencode-agent
entrypoint: opencode
tty: true

providers:
  - profile: github
  - profile: google-vertex-ai
  - profile: atlassian
    env:
      JIRA_URL:
      JIRA_USERNAME:
  - profile: google-workspace

env:
  ANTHROPIC_BASE_URL: https://inference.local/v1
  ANTHROPIC_API_KEY: sk-ant-openshell-proxy-managed

payloads:
  - sandbox_path: /sandbox/opencode.json
    local_path: profiles/images/sandbox-default/opencode.json
  - sandbox_path: /sandbox/.mcp.json
    local_path: profiles/images/sandbox-default/mcp.json
