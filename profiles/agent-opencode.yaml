# OpenCode agent configuration.
#
# LIMITATION: OpenCode inference via Vertex AI is not currently supported
# in OpenShell sandboxes. Two blockers:
#   1. inference.local only supports Anthropic format (/v1/messages).
#      OpenCode uses OpenAI format (/v1/chat/completions).
#   2. Direct Vertex AI access requires ADC credentials on disk.
#      OpenShell's proxy-managed credential model doesn't expose raw
#      ADC files inside the sandbox.
#
# OpenCode CAN use the sandbox for MCP tools (Jira, GWS), GitHub,
# and other providers -- just not for inference via Vertex AI.
#
# Workarounds:
#   - Use an OpenAI API key provider (e.g., groq, openrouter) instead
#   - Wait for OpenShell to add OpenAI format support to inference.local
#
# Usage:
#   harness apply --agent opencode

name: opencode-agent
entrypoint: opencode
tty: true

providers:
  - profile: github
  - profile: atlassian
    env:
      JIRA_URL: ${JIRA_URL}
      JIRA_USERNAME: ${JIRA_USERNAME}
  - profile: gws
