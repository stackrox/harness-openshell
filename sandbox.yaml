# OpenShell Sandbox — in-cluster launcher
#
# Apply this file to launch a sandbox without any local env vars or files.
# Credentials are read from K8s Secrets mounted into the launcher pod.
#
# Prerequisites:
#   ./deploy-ocp.sh          # deploys gateway and creates RBAC
#   ./setup-creds.sh         # stores GWS + Atlassian config in cluster
#   ./setup-providers.sh     # registers API tokens with gateway
#
# Usage:
#   kubectl apply -f sandbox.yaml    # launch sandbox
#   kubectl delete -f sandbox.yaml   # stop sandbox
#
# Configuration: edit the config.yaml section below.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sandbox-agent
  namespace: openshell
data:
  config.yaml: |
    name: agent
    command: claude --bare
    keep: true

    providers:
      - github
      - vertex-local
      - atlassian

    # Skills/plugin marketplaces (future — see sandbox/launcher/SPEC.md)
    # skills:
    #   - repo: https://github.com/stackrox/skills
---
apiVersion: batch/v1
kind: Job
metadata:
  name: sandbox-agent
  namespace: openshell
  labels:
    app: openshell-sandbox
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: openshell-sandbox
    spec:
      serviceAccountName: openshell-launcher
      restartPolicy: Never

      containers:
        - name: launcher
          image: quay.io/rcochran/openshell:launcher
          imagePullPolicy: Always

          env:
            - name: GATEWAY_ENDPOINT
              value: "https://openshell.openshell.svc.cluster.local:8080"
            - name: HOME
              value: "/tmp"
            - name: JIRA_URL
              valueFrom:
                secretKeyRef:
                  name: openshell-atlassian
                  key: JIRA_URL
                  optional: true
            - name: JIRA_USERNAME
              valueFrom:
                secretKeyRef:
                  name: openshell-atlassian
                  key: JIRA_USERNAME
                  optional: true

          volumeMounts:
            - name: config
              mountPath: /etc/openshell/sandbox
              readOnly: true
            - name: gws
              mountPath: /secrets/gws
              readOnly: true
            - name: gateway-mtls
              mountPath: /secrets/mtls
              readOnly: true
            - name: sandbox-env
              mountPath: /etc/openshell/env
              readOnly: true

      volumes:
        - name: config
          configMap:
            name: sandbox-agent
        - name: gws
          secret:
            secretName: openshell-gws
            optional: true
        - name: gateway-mtls
          secret:
            secretName: openshell-client-tls
        - name: sandbox-env
          configMap:
            name: sandbox-env
            optional: true
