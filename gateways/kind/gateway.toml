# kind gateway — deploys openshell to a local kind cluster.
#
# Prerequisites:
#   - kind installed and cluster running:
#       kind create cluster --name openshell
#   - kubectl context set to the kind cluster
#
# Uses NodePort + node InternalIP for access (no Ingress controller needed).
# Direct mode: no launcher Job, providers registered from workstation.
# No mTLS: the gateway runs HTTP for local dev simplicity.

[gateway]
type = "remote"
platform = "k8s"
service = "nodeport"
name = "openshell-kind"
mode = "direct"

[providers]
enabled = ["github", "vertex-local", "atlassian", "gws"]

[chart]
oci = "oci://ghcr.io/nvidia/openshell/helm-chart"
version = "0.0.58"
[chart.crd]
url = "https://github.com/kubernetes-sigs/agent-sandbox/releases/latest/download/manifest.yaml"

[helm]
values = "values.yaml"
