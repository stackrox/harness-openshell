# Launcher RBAC — namespace set by kubectl -n flag.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openshell-launcher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openshell-launcher
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openshell-launcher
subjects:
  - kind: ServiceAccount
    name: openshell-launcher
roleRef:
  kind: Role
  name: openshell-launcher
  apiGroup: rbac.authorization.k8s.io
