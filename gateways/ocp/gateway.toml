# OpenShift gateway — deploys openshell to an OCP cluster.
#
# Prerequisites:
#   - oc login to the target cluster
#   - KUBECONFIG set or default context pointing to OCP
#
# Addons applied in order:
#   - addons/rbac.yaml    — launcher ServiceAccount + Role
#   - addons/route.yaml   — OpenShift Route for external access
#   - SCC grants for openshell service accounts (via oc CLI)

[gateway]
type = "remote"
platform = "ocp"
service = "route"
name = "openshell-remote-ocp"
mode = "launcher"

[providers]
enabled = ["github", "vertex-local", "atlassian", "gws"]

[chart]
oci = "oci://ghcr.io/nvidia/openshell/helm-chart"
version = "0.0.58"
[chart.crd]
url = "https://github.com/kubernetes-sigs/agent-sandbox/releases/latest/download/manifest.yaml"

[helm]
values = "values.yaml"

[addons]
manifests = ["addons/rbac.yaml", "addons/route.yaml"]

[ocp]
scc-privileged = ["openshell", "openshell-sandbox"]
scc-anyuid = ["openshell"]

[secrets]
mtls = "openshell-client-tls"

[launcher]
service-account = "openshell-launcher"
gateway-endpoint = "https://openshell.openshell.svc.cluster.local:8080"
