version: 2

# Asset names match the README install instructions:
#   releases/latest/download/harness_darwin_arm64
project_name: harness

builds:
  - binary: harness
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: ["binary"]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
