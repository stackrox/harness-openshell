# OpenCode with Vertex AI -- direct access (not inference.local).
# inference.local only supports Anthropic format; OpenCode uses OpenAI format.
# Requires: gcloud auth application-default login, ANTHROPIC_VERTEX_PROJECT_ID.
name: test-opencode
entrypoint: opencode
providers:
  - profile: vertex-local
env:
  GOOGLE_CLOUD_PROJECT: ${ANTHROPIC_VERTEX_PROJECT_ID}
  VERTEX_LOCATION: global
