# All providers agent -- tests full provider composition.
# Tests: all four provider types registered together, env merging.
# Requires: GITHUB_TOKEN, JIRA_API_TOKEN, JIRA_URL, JIRA_USERNAME,
#           gcloud ADC, gws auth login.
name: test-all-providers
entrypoint: bash
providers:
  - profile: github
  - profile: google-vertex-ai
  - profile: atlassian
    env:
      JIRA_URL:
      JIRA_USERNAME:
  - profile: google-workspace
env:
  ANTHROPIC_BASE_URL: https://inference.local
  ANTHROPIC_API_KEY: sk-ant-openshell-proxy-managed
