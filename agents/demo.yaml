# Hackathon demo agent -- runs the cross-tool status snapshot task.
#
# Usage:
#   harness up --local --agent demo

name: demo
image: ghcr.io/robbycochran/harness-openshell:sandbox
entrypoint: claude --bare -p
task: demo/DEMO-TASK.md
tty: false

providers:
  - profile: github
  - profile: vertex-local
  - profile: atlassian
    config:
      JIRA_URL: ${JIRA_URL}
      JIRA_USERNAME: ${JIRA_USERNAME}
  - profile: gws

env:
  ANTHROPIC_BASE_URL: https://inference.local
  ANTHROPIC_API_KEY: sk-ant-openshell-proxy-managed
  CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: "1"
