# OpenShell Helm values for OpenShift deployment.
#
# Override image repos/tags via environment variables in deploy-ocp.sh.
# Only non-default values are listed here.

# Always pull images so updates are picked up without manual pod restarts.
image:
  pullPolicy: Always

supervisor:
  image:
    pullPolicy: Always

# OpenShift security context: let OpenShift assign UIDs via SCC.
# runAsUser and runAsNonRoot are nulled so OpenShift's SCC assigns the UID.
# fsGroup is kept so the PVC at /var/openshell is group-writable.
securityContext:
  runAsUser: null
  runAsNonRoot: null

# Always pull sandbox images (development workflow).
server:
  sandboxImagePullPolicy: Always
  # allowUnauthenticatedUsers: the gateway is not internet-exposed — it is
  # only accessible via the OpenShift route with TLS passthrough + mTLS.
  # The client cert in ~/.config/openshell/gateways/ocp/mtls/ is the gate.
  # To add OIDC on top of mTLS, configure server.oidc.issuer instead.
  auth:
    allowUnauthenticatedUsers: true

# PKI: auto-generate mTLS secrets on first install.
# serverDnsNames is patched at deploy time to include the Route hostname.
pkiInitJob:
  enabled: true
